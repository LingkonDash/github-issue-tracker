<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!-- Author Details -->
  <meta name="author" content="LINGKON DASH">
  <meta name="description" content="Github-Issue-Tracker">

  <title>Github-Issue-Tracker | Login</title>

  <!-- DaisyUI and Tailwind-CSS -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Custom CSS and Geist Font -->
  <link rel="stylesheet" href="style.css">

  <!-- favicon -->
  <link rel="shortcut icon" href="assets/favicon.png" type="image/png">
</head>

<body class="flex justify-center items-center h-screen w-screen">
  <header>
    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">

      <label class="label">Email</label>
      <input type="email" class="input" placeholder="Email" />

      <label class="label">Password</label>
      <input type="password" class="input" placeholder="Password" />

      <button class="btn btn-neutral mt-4">Login</button>
    </fieldset>
  </header>
  <script src="scripts/login.js"></script>
</body>

</html>
