<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!-- Author Details -->
  <meta name="author" content="LINGKON DASH">
  <meta name="description" content="Github-Issue-Tracker | Login">

  <title>Github-Issue-Tracker | Login</title>

  <!-- DaisyUI and Tailwind-CSS -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Custom CSS and Geist Font -->
  <link rel="stylesheet" href="style.css">

  <style type="text/tailwindcss">
    @theme {
      --color-primary-text: #000000;
      --color-secondary-text: #64748B;

      --color-blue-text: #0066ffde;
    }
    </style>

  <!-- favicon -->
  <link rel="shortcut icon" href="assets/favicon.png" type="image/png">
</head>

<body class="flex flex-col justify-center bg-base-200 items-center min-h-[100dvh] p-10">
  <header class="space-y-6 bg-white p-8 shadow-lg rounded-2xl">

    <div class="flex flex-col justify-center items-center text-center space-y-6">
      <div>
        <img src="assets/github-logo.png" alt="Github logo">
      </div>
      <div class="space-y-1">
        <h1 class="text-primary-text text-2xl font-semibold">GitHub Issues Tracker</h1>
        <p class="text-secondary-text">Sign in to manage your issues</p>
      </div>
    </div>

    <fieldset class="fieldset w-xs p-4">

      <label class="text-primary-text text-xs font-semibold">Username</label>
      <input type="text" id="login-email" value="admin" class="input" placeholder="Enter Username" />
      <p class="label text-blue-text">Default: admin</p>

      <label class="text-primary-text text-xs font-semibold">Password</label>
      <div class="input flex justify-center items-center">
        <input type="password" id="login-password" placeholder="Password" />
        <button onclick="eyebutton()" class="cursor-pointer text-secondary-text hover:text-primary-text"><i id="eye"
            class="fa-solid fa-eye-slash"></i></button>
      </div>
      <p class="label text-blue-text">Default: admin123</p>

      <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>
    </fieldset>

    <div class="divider">OR</div>

    <div class="text-secondary-text text-[14px] text-center">
      <p class="mb-2">Demo Credentials:</p>
      <div class="text-center p-6 bg-base-200 rounded-lg">
        <p><span class="font-medium text-primary-text">Username:</span> admin</p>
        <p><span class="font-medium text-primary-text">Password:</span> admin123</p>
      </div>
    </div>

  </header>
  <script src="scripts/login.js"></script>
</body>

</html>
