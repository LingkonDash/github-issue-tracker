<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!-- Author Details -->
  <meta name="author" content="LINGKON DASH">
  <meta name="description" content="Github-Issue-Tracker">

  <title>Github-Issue-Tracker</title>

  <!-- DaisyUI and Tailwind-CSS -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Custom CSS and Geist Font -->
  <link rel="stylesheet" href="style.css">

  <style type="text/tailwindcss">
    @theme {
      --color-primary-text: #1F2937;
      --color-secondary-text: #64748B;

      --color-primary-bg: #F8FAFC;
      --color-secondary-bg: #ffffff;
      --color-issues-bg: #FBFBFB;


      --color-green-border: #00A96E;
      --color-purple-border: #A855F7;

      --color-soft-red: #FEECEC;
      --color-soft-yellow: #FFF8DB;
      --color-soft-green: #DEFCE8;
      --color-soft-blue: #3abff820;
      --color-soft-primary: #4A00FF10;
    }
    </style>

  <!-- favicon -->
  <link rel="shortcut icon" href="assets/favicon.png" type="image/png">
</head>

<body class="bg-primary-bg min-h-[100dvh]">
  <header class="bg-secondary-bg shadow-sm px-6">
    <nav class="max-w-[1600px] mx-auto navbar flex justify-between items-center">
      <div class="flex gap-2 justify-center items-center">
        <img width="36" src="assets/github-logo.png" alt="Github logo">
        <h1 class="font-semibold text-2xl text-primary-text">GitHub Issues Tracker</h1>
      </div>
      <div class="hidden md:flex justify-center items-center gap-2">
        <div class="input input-bordered w-40 md:w-auto">
          <button class="mt-[2px] cursor-pointer text-primary-text"><i
              class="fa-solid fa-magnifying-glass"></i></button>
          <input type="text" placeholder="Search issues..." />
        </div>
        <button class="btn btn-primary">+ New Issue</button>
      </div>
      <div class="relative md:hidden">
        <button onclick="dropdownMenu()" class="text-2xl"><i class="fa-solid fa-bars"></i></button>
        <div id="dropdown-Menu"
          class="absolute top-[47px] bg-white -right-[22px] hidden flex-col gap-5 py-10 p-5 shadow-md">
          <div class="input input-bordered w-40 md:w-auto">
            <button class="mt-[2px] cursor-pointer"><i class="fa-solid fa-magnifying-glass"></i></button>
            <input type="text" placeholder="Search issues..." />
          </div>
          <button class="btn btn-primary shadow-none">+ New Issue</button>
        </div>
      </div>
    </nav>
  </header>
  <main class="max-w-[1600px] mx-auto px-6">
    <!-- Buttons  -->
    <section class="mt-12 shadow-sm bg-secondary-bg p-6 rounded-lg">
      <div id="btn-container" class="flex flex-wrap gap-2 justify-around md:justify-start">
        <button id="all-btn" onclick="issueLoader('all-btn')" class="btn btn-primary w-24">All</button>
        <button id="open-btn" onclick="issueLoader('open-btn')" class="btn w-24">Open</button>
        <button id="closed-btn" onclick="issueLoader('closed-btn')" class="btn w-24">Closed</button>
      </div>
    </section>

    <!-- Main Section (issue loader) -->
    <section id="mainSection" class="mt-5 shadow-md rounded-lg bg-issues-bg">
      <div class="flex justify-between items-center bg-secondary-bg rounded-t-lg border-b-3 border-[#E4E4E7] p-6">
        <div class="flex justify-center items-center gap-2">
          <div class="rounded-full bg-[#ECE4FF] p-2 w-fit">
            <img src="assets/Aperture.png" alt="Issues">
          </div>
          <div>
            <h2 class="font-semibold text-xl text-primary-text"><span id="total-issues">0</span> Issues</h2>
            <p class="text-secondary-text">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex justify-center items-center gap-4  text-primary-text pl-3">
          <div class="flex justify-center items-center gap-2">
            <img src="assets/green-ellipse.png" alt="Green Circle">
            <p>Open</p>
          </div>
          <div class="flex justify-center items-center gap-2">
            <img src="assets/purple-ellipse.png" alt="Purple Circle">
            <p>Closed</p>
          </div>
        </div>
      </div>

      <!-- Issues will load here  -->
      <div id="parent-Div"class="p-5 pt-10 grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 justify-items-center align-items-stretch gap-4">


      </div>

    </section>
    <section id="loader" class=" z-10 hidden justify-center items-center mt-32">
      <span class="loading loading-spinner loading-xl scale-180"></span>
    </section>

  </main>
  <script src="scripts/main.js"></script>
</body>

</html>
